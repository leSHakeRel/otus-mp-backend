run:
  timeout: 5m
  go: "1.25"

linters:
  enable:
    - errcheck
    - goimports
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - typecheck
    - unused
  disable:
    - depguard

linters-settings:
  goimports:
    local-prefixes: movie-night-planner-backend

issues:
  exclude-use-default: false
  exclude:
    - "SA1019" # Deprecated fields
    - "SA1006" # Printf-style function with dynamic format string
